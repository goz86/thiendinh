<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="zenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8B5A2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8D9B87;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#FCF9F3" />
  
  <!-- Outer Ring (Zen Circle / Enso style but clean) -->
  <path d="M256,40 A216,216 0 1,1 255.9,40" stroke="url(#zenGradient)" stroke-width="24" fill="none" stroke-linecap="round" stroke-dasharray="600 100" />
  
  <!-- Stylized Lotus / Breath Petals -->
  <g fill="url(#zenGradient)" opacity="0.9">
    <!-- Center Petal -->
    <path d="M256,160 Q286,220 256,320 Q226,220 256,160" />
    <!-- Left Petal -->
    <path d="M256,220 Q200,180 140,240 Q200,300 256,240" />
    <!-- Right Petal -->
    <path d="M256,220 Q312,180 372,240 Q312,300 256,240" />
  </g>
  
  <!-- Subtle Glow -->
  <circle cx="256" cy="240" r="120" fill="url(#zenGradient)" opacity="0.1" />
</svg>
